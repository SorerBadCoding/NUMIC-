databases:
  - name: numportal-db
    plan: free
    databaseName: numportal
    user: numportal

services:
  - type: web
    name: numportal
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn numportal.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: numportal-db
          property: connectionString
      - key: GOOGLE_MAPS_API_KEY
        sync: false
